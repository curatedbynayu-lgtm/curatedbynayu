// SUPABASE FUNCTIONS
async function initDB() {
  showSync('Connecting...');
  try {
    // Create tables if not exist via upsert pattern
    // Load stock
    var stockRes = await sb.from('stock').select('*');
    if (stockRes.error || !stockRes.data || stockRes.data.length === 0) {
      // Insert default stock
      var toInsert = DEFAULT.map(function(p) {
        return {id:p.id, cat:p.cat, model:p.model, detail:p.detail||'', qty:p.qty, pa:p.pa, pb:p.pb};
      });
      await sb.from('stock').upsert(toInsert);
      S.p = JSON.parse(JSON.stringify(DEFAULT));
    } else {
      S.p = stockRes.data.map(function(r) {
        return {id:r.id, cat:r.cat, model:r.model, detail:r.detail||'', qty:r.qty||0, pa:r.pa||0, pb:r.pb||0};
      });
      // Add any missing items
      var ids = {};
      S.p.forEach(function(x) { ids[x.id] = true; });
      var toAdd = DEFAULT.filter(function(x) { return !ids[x.id]; });
      if (toAdd.length > 0) {
        await sb.from('stock').upsert(toAdd);
        toAdd.forEach(function(x) { S.p.push(JSON.parse(JSON.stringify(x))); });
      }
    }
    // Load sales
    var salesRes = await sb.from('sales').select('*').order('created_at', {ascending:false});
    if (!salesRes.error && salesRes.data) {
      S.v = salesRes.data.map(function(r) {
        return {
          id: r.id, ts: new Date(r.created_at).getTime(),
          h: r.hour, d: r.day,
          lines: r.lines, tot: r.tot, cogs: r.cogs||0,
          who: r.who, pm: r.pm, ec: r.ec||'',
          cancelled: r.cancelled||false, cancelledAt: r.cancelled_at
        };
      });
    }
    // Load settings
    var settRes = await sb.from('settings').select('*').eq('id', 'main').single();
    if (!settRes.error && settRes.data) {
      S.taux = settRes.data.taux || 2650;
      S.sn = settRes.data.sn || '';
    }
    S.loaded = true;
    showSync('');
    // Subscribe to realtime changes
    sb.channel('stock-changes')
      .on('postgres_changes', {event:'*', schema:'public', table:'stock'}, function(payload) {
        if (payload.eventType === 'UPDATE' || payload.eventType === 'INSERT') {
          var r = payload.new;
          var idx = -1;
          S.p.forEach(function(p,i) { if(p.id===r.id) idx=i; });
          var item = {id:r.id,cat:r.cat,model:r.model,detail:r.detail||'',qty:r.qty||0,pa:r.pa||0,pb:r.pb||0};
          if (idx >= 0) S.p[idx] = item; else S.p.push(item);
          render();
        }
        if (payload.eventType === 'DELETE') {
          S.p = S.p.filter(function(p) { return p.id !== payload.old.id; });
          render();
        }
      })
      .on('postgres_changes', {event:'INSERT', schema:'public', table:'sales'}, function(payload) {
        var r = payload.new;
        var exists = S.v.filter(function(v) { return v.id===r.id; }).length > 0;
        if (!exists) {
          S.v.unshift({id:r.id,ts:new Date(r.created_at).getTime(),h:r.hour,d:r.day,lines:r.lines,tot:r.tot,cogs:r.cogs||0,who:r.who,pm:r.pm,ec:r.ec||'',cancelled:false});
          render();
        }
      })
      .on('postgres_changes', {event:'UPDATE', schema:'public', table:'sales'}, function(payload) {
        var r = payload.new;
        S.v.forEach(function(v,i) { if(v.id===r.id) S.v[i].cancelled=r.cancelled; });
        render();
      })
      .subscribe();
    render();
  } catch(e) {
    showSync('Offline mode — data saved locally', true);
    S.p = JSON.parse(JSON.stringify(DEFAULT));
    S.loaded = true;
    render();
  }
}

async function saveStock(p) {
  try {
    await sb.from('stock').upsert({id:p.id,cat:p.cat,model:p.model,detail:p.detail||'',qty:p.qty,pa:p.pa,pb:p.pb});
  } catch(e) {}
}

async function deleteStock(id) {
  try { await sb.from('stock').delete().eq('id', id); } catch(e) {}
}

async function saveSale(sale) {
  try {
    await sb.from('sales').insert({
      id: sale.id, hour: sale.h, day: sale.d,
      lines: sale.lines, tot: sale.tot, cogs: sale.cogs||0,
      who: sale.who, pm: sale.pm, ec: sale.ec||'',
      cancelled: false
    });
  } catch(e) {}
}

async function cancelSaleDB(id) {

}

async function saveSettings() {

}

// HELPERS
function fu(n) { return '$' + Number(n).toFixed(2); }
function ftz(n) { return Math.round(n * S.taux).toLocaleString('fr-FR') + ' TZS'; }
function nt() { var d = new Date(); return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0'); }
function td() { var d = new Date(); return d.getDate().toString().padStart(2,'0') + '/' + (d.getMonth()+1).toString().padStart(2,'0') + '/' + d.getFullYear(); }
function cats() { var c = ['All']; S.p.forEach(function(p) { if (c.indexOf(p.cat) === -1) c.push(p.cat); }); return c; }
function catIcon(c) { var m = {Earrings:'💎',Bracelets:'⭕',Rings:'💍','Hair accessories':'🌸',Bags:'👜',Clothing:'👗',Sets:'✨','Neema International':'🏷️',Boxes:'🎁'}; return m[c] || '📦'; }

function calc(p) {
  var pa=p.pa||0, pb=p.pb||0, qty=p.qty||0;
  var ben=pb-pa, benT=ben*qty;
  var tax3=pb*0.03, tax15=pb*0.15;
  var net3=ben-tax3, net15=ben-tax15;
  var net3T=net3*qty, net15T=net15*qty;
  var mg3=pb>0&&pa>0?((net3/pb)*100).toFixed(1)+'%':'—';
  var mg15=pb>0&&pa>0?((net15/pb)*100).toFixed(1)+'%':'—';
  return {pa:pa,pb:pb,ben:ben,benT:benT,tax3:tax3,tax15:tax15,net3:net3,net15:net15,net3T:net3T,net15T:net15T,mg3:mg3,mg15:mg15};
}

function pp(k) {
  if (k==='del') S.pin=S.pin.slice(0,-1);
  else if (S.pin.length<4) S.pin+=k;
  if (S.pin.length===4) {
    if (S.pin===PINS[S.pc]) {
      S.mode=S.pc; S.pin=''; S.pe=false;
      if (S.mode==='staff'&&!S.sn) S.sc='sn';
      else S.sc=S.mode==='owner'?'dash':'sale';
    } else {
      S.pe=true;
      setTimeout(function(){S.pin='';S.pe=false;render();},900);
    }
  }
  render();
}

function toggleCard(id) { S.openCards[id]=!S.openCards[id]; render(); }

async function deleteProduct(id) {
  if (!confirm('Delete '+id+' permanently?')) return;
  S.p=S.p.filter(function(x){return x.id!==id;});
  delete S.openCards[id];
  await deleteStock(id);
  render();
}

async function saveCard(id) {
  var p=S.p.filter(function(x){return x.id===id;})[0];
  if (!p) return;
  function g(f){var el=document.getElementById(id+'-'+f);return el?el.value:'';}
  p.model=g('model')||p.model;
  p.detail=g('detail');
  p.qty=parseInt(g('qty'))||0;
  p.pa=parseFloat(g('pa'))||0;
  p.pb=parseFloat(g('pb'))||0;
  await saveStock(p);
  S.openCards[id]=false;
  render();
}

function addCart(id) {
  var p=S.p.filter(function(x){return x.id===id;})[0];
  if (!p||p.qty===0||p.pb===0) return;
  var e=S.cart.filter(function(c){return c.id===id;})[0];
  if (e){if(e.qty<p.qty)e.qty++;}
  else S.cart.push({id:p.id,cat:p.cat,model:p.model,detail:p.detail,qty:1,pa:p.pa,pb:p.pb,sp:p.pb});
  S.q='';S.tr=null;render();
}

function removeFromCart(id) { S.cart=S.cart.filter(function(c){return c.id!==id;});render(); }

function chQty(id,d) {
  var p=S.p.filter(function(x){return x.id===id;})[0];
  var e=S.cart.filter(function(c){return c.id===id;})[0];
  if (!e) return;
  e.qty+=d;
  if (e.qty<=0) S.cart=S.cart.filter(function(c){return c.id!==id;});
  if (p&&e.qty>p.qty) e.qty=p.qty;
  render();
}

function search() {
  var q=S.q.trim();
  if (!q){S.tr=null;render();return;}
  var p=null;
  S.p.forEach(function(x){
    if (!p&&(x.id.toUpperCase()===q.toUpperCase()||x.model.toLowerCase().indexOf(q.toLowerCase())!==-1)) p=x;
  });
  S.tr=p||'none';render();
}

function openRecu(){if(!S.cart.length)return;S.sr=true;S.pm='cash';S.ec='';render();}

async function confirm2() {
  var lines=S.cart.map(function(c){return {id:c.id,model:c.model,detail:c.detail,qty:c.qty,sp:c.sp,pa:c.pa};});
  var tot=lines.reduce(function(s,c){return s+c.sp*c.qty;},0);
  var cogs=lines.reduce(function(s,c){return s+(c.pa||0)*c.qty;},0);
  var sale={id:Date.now(),ts:Date.now(),h:nt(),d:td(),lines:lines,tot:tot,cogs:cogs,who:S.mode==='owner'?'Owner':(S.sn||'Staff'),pm:S.pm,ec:S.ec,cancelled:false};

  // Update stock quantities
  for (var i=0;i<S.cart.length;i++) {
    var ci=S.cart[i];
    var p=S.p.filter(function(x){return x.id===ci.id;})[0];
    if (p) {
      p.qty-=ci.qty;
      await saveStock(p);
    }
  }
  S.v.unshift(sale);
  await saveSale(sale);
  S.lr=sale; S.cart=[];

  var ownerSubj=encodeURIComponent('Vente Nayu — '+fu(tot)+' — '+sale.who);
  var ownerBody=encodeURIComponent('NOUVELLE VENTE\nDate: '+td()+' a '+nt()+'\nVendeuse: '+sale.who+'\nPaiement: '+(sale.pm==='cash'?'Especes':'Carte')+'\n\nARTICLES:\n'+lines.map(function(l){return l.model+(l.detail?' '+l.detail:'')+' x'+l.qty+' = '+fu(l.sp*l.qty);}).join('\n')+'\n\nTOTAL: '+fu(tot)+'\n\n— Curated by Nayu, The Aiyana Pemba');
  window.open('mailto:'+OWNER_EMAIL+'?subject='+ownerSubj+'&body='+ownerBody);
  if (S.ec) window.open('mailto:'+S.ec+'?subject='+encodeURIComponent('Your receipt — Curated by Nayu')+'&body='+encodeURIComponent(mkR(sale)));

  S.sr=false;S.sc='recu';render();
}

function canCancel(sale){return S.mode==='owner'||(Date.now()-sale.ts)<CANCEL_WINDOW;}

async function cancelSale(id) {
  var v=S.v.filter(function(x){return x.id===id;})[0];
  if (!v||v.cancelled) return;
  if (!canCancel(v)){alert('Annulation impossible apres 10 min.');return;}
  if (!confirm('Annuler cette vente?')) return;
  v.cancelled=true;
  for (var i=0;i<v.lines.length;i++) {
    var l=v.lines[i];
    var p=S.p.filter(function(x){return x.id===l.id;})[0];
    if (p){p.qty+=l.qty;await saveStock(p);}
  }
  await cancelSaleDB(id);
  if (S.mode==='staff') {
    var subj=encodeURIComponent('VENTE ANNULEE — Nayu — '+v.who);
    var body=encodeURIComponent('VENTE ANNULEE\nVendeuse: '+v.who+'\nDate: '+v.d+' '+v.h+'\nMontant: '+fu(v.tot));
    window.open('mailto:'+OWNER_EMAIL+'?subject='+subj+'&body='+body);
  }
  render();
}

function mkR(v) {
  var t='YOUR RECEIPT\n─────────────────────────\n';
  v.lines.forEach(function(l){t+=l.model+(l.detail?' '+l.detail:'')+' x'+l.qty+'   '+fu(l.sp*l.qty)+'\n';});
  t+='─────────────────────────\nTotal   '+fu(v.tot)+'\n\nPayment: '+(v.pm==='cash'?'Cash':'Card')+'\nDate: '+v.d+' at '+v.h+'\n\nThe Aiyana, Pemba Island — Tanzania\n\nThank you for shopping with us,\nyou have great taste! ✨\n\nCurated by Nayu 🌺';
  return t;
}

function exportCSV() {

async function addProduct() {

  var cm={E:'Earrings',B:'Bracelets',R:'Rings',H:'Hair accessories',BG:'Bags',CL:'Clothing',ST:'Sets',NI:'Neema International',BOX:'Boxes'};
  var prefix=uid.split('-')[0];

  S.p.sort(function(a,b){return a.cat.localeCompare(b.cat)||a.id.localeCompare(b.id);});

function filterByPeriode(ventes) {
  if (S.periode==='Tout') return ventes;
  var now=new Date();
  return ventes.filter(function(v){
    var pts=v.d.split('/');
    var vd=new Date(parseInt(pts[2]),parseInt(pts[1])-1,parseInt(pts[0]));
    if (S.periode==="Aujourd'hui") return vd.toDateString()===now.toDateString();
    if (S.periode==='Cette semaine'){var ws=new Date(now);ws.setDate(now.getDate()-now.getDay()+1);ws.setHours(0,0,0,0);return vd>=ws;}
    if (S.periode==='Ce mois') return vd.getMonth()===now.getMonth()&&vd.getFullYear()===now.getFullYear();
    return true;
  });
}

function rSale(){
  var low=S.p.filter(function(p){return p.qty>0&&p.qty<=2;});
  var out=S.p.filter(function(p){return p.qty===0;});
  var tot=S.cart.reduce(function(s,c){return s+c.sp*c.qty;},0);
  var prods=S.fc==='All'?S.p:S.p.filter(function(p){return p.cat===S.fc;});
  var h='';
  if (out.length) h+='<div class="alerte alerte-red"><i class="ti ti-alert-circle" style="font-size:16px;flex-shrink:0"></i><div><strong>Out of stock:</strong> '+out.map(function(p){return p.id;}).join(', ')+'</div></div>';
  if (low.length) h+='<div class="alerte"><i class="ti ti-alert-triangle" style="font-size:16px;flex-shrink:0"></i><div><strong>Low stock (≤2):</strong> '+low.map(function(p){return p.id+' ('+p.qty+')';}).join(', ')+'</div></div>';
  h+='<label>Search</label><input type="text" placeholder="E-1  or  nacre…" value="'+S.q+'" oninput="S.q=this.value;search()" style="margin-bottom:12px">';
  if (S.tr&&S.tr!=='none'){
    h+='<div style="background:var(--bg);border:2px solid var(--green);border-radius:var(--rl);padding:14px;margin-bottom:12px"><div style="font-size:12px;color:#3c4aa0;font-weight:700">'+S.tr.id+'</div><div style="font-size:17px;font-weight:700;margin:3px 0">'+S.tr.model+(S.tr.detail?' — '+S.tr.detail:'')+'</div><div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px"><div><div style="font-size:22px;font-weight:700">'+(S.tr.pb>0?fu(S.tr.pb):'Price TBC')+'</div>'+(S.tr.pb>0?'<div style="font-size:13px;color:var(--text2)">'+ftz(S.tr.pb)+'</div>':'')+'</div><span class="pill '+(S.tr.qty===0?'p-zero':S.tr.qty<=2?'p-low':'p-ok')+'">'+(S.tr.qty===0?'Out':S.tr.qty<=2?S.tr.qty+' — LOW':S.tr.qty+' in stock')+'</span></div><button class="btn btn-dark" onclick="addCart(\''+S.tr.id+'\')" '+(S.tr.qty===0||S.tr.pb===0?'disabled':'')+'>'+( S.tr.pb===0?'Set price first':S.tr.qty===0?'Out of stock':'+ Add to cart')+'</button></div>';
  }
  if (S.tr==='none') h+='<div style="font-size:14px;color:var(--rtxt);background:var(--rbg);border-radius:var(--r);padding:12px 14px;margin-bottom:12px">Not found</div>';
  h+='<label>Category</label><div class="filtres">'+cats().map(function(c){return '<button class="filtre '+(S.fc===c?'on':'')+'" onclick="S.fc=\''+c+'\';render()">'+catIcon(c)+' '+c+'</button>';}).join('')+'</div>';
  h+=prods.map(function(p){

      if (v.cancelled) h+='<span class="cancelled-badge">ANNULEE</span>';
      if (!v.cancelled&&S.mode==='owner') h+='<button class="btn-sm-red" onclick="cancelSale('+v.id+')">Annuler</button>';
      h+='</div></div><div style="font-size:12px;color:var(--text2);margin-bottom:6px">'+v.lines.map(function(l){return l.model+(l.detail?' '+l.detail:'')+' x'+l.qty+' = '+fu(l.sp*l.qty);}).join(' | ')+'</div>';
      if (!v.cancelled){
        h+='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:8px"><div style="background:var(--bg2);border-radius:6px;padding:6px;text-align:center"><div style="font-size:10px;color:var(--text2);font-weight:600">Benef. brut</div><div style="font-size:13px;font-weight:700;color:var(--gtxt)">'+fu(ben)+'</div></div><div style="background:var(--gbg);border-radius:6px;padding:6px;text-align:center"><div style="font-size:10px;color:var(--gtxt);font-weight:600">Net 3%</div><div style="font-size:13px;font-weight:700;color:var(--gtxt)">'+fu(ben-v.tot*0.03)+'</div></div><div style="background:var(--abg);border-radius:6px;padding:6px;text-align:center"><div style="font-size:10px;color:var(--atxt);font-weight:600">Net 15%</div><div style="font-size:13px;font-weight:700;color:var(--atxt)">'+fu(ben-v.tot*0.15)+'</div></div></div>';
      }
      h+='<div style="font-size:12px;color:var(--text3);margin-top:6px">'+v.h+' — '+(v.pm==='cash'?'Cash':'Card')+(v.ec?' — '+v.ec:'')+'</div></div>';
    });
  });
  return h;
}

function rHist(){
  var myV=S.v.filter(function(v){return v.who===S.sn||v.who==='Staff';});
  var byDate={};myV.forEach(function(v){if(!byDate[v.d])byDate[v.d]=[];byDate[v.d].push(v);});
  var dates=Object.keys(byDate).sort(function(a,b){var pa=a.split('/'),pb=b.split('/');return new Date(pb[2],pb[1]-1,pb[0])-new Date(pa[2],pa[1]-1,pa[0]);});
  var h='<div style="font-size:13px;color:var(--text2);margin-bottom:12px">Vos ventes — annulation possible dans les 10 min</div>';
  if (dates.length===0) return h+'<div class="empty"><i class="ti ti-history"></i>Aucune vente encore</div>';
  dates.forEach(function(date){
    var dayV=byDate[date];
    var dayTot=dayV.filter(function(v){return !v.cancelled;}).reduce(function(s,v){return s+v.tot;},0);
    h+='<div class="fact-day">'+date+' — '+fu(dayTot)+'</div>';
    dayV.forEach(function(v){
      var canC=canCancel(v)&&!v.cancelled;
      var minsLeft=Math.max(0,Math.round((CANCEL_WINDOW-(Date.now()-v.ts))/60000));
      h+='<div class="fact-row'+(v.cancelled?' cancelled':'')+'"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><span style="font-size:16px;font-weight:700">'+(v.cancelled?'<span style="text-decoration:line-through">':'')+fu(v.tot)+(v.cancelled?'</span>':'')+'</span><div style="display:flex;align-items:center;gap:6px">';
      if (v.cancelled) h+='<span class="cancelled-badge">ANNULEE</span>';
      else if (canC) h+='<button class="btn-sm-red" onclick="cancelSale('+v.id+')">Annuler ('+minsLeft+'min)</button>';
      h+='</div></div><div style="font-size:12px;color:var(--text2);margin-bottom:4px">'+v.lines.map(function(l){return l.model+(l.detail?' '+l.detail:'')+' x'+l.qty;}).join(', ')+'</div><div style="font-size:12px;color:var(--text3)">'+v.h+' — '+(v.pm==='cash'?'Cash':'Card')+'</div></div>';
    });
  });
  return h;
}

function rCompta(){
  var act=S.v.filter(function(v){return !v.cancelled;});
  var totCA=act.reduce(function(s,v){return s+v.tot;},0);
  var totCogs=act.reduce(function(s,v){return s+(v.cogs||0);},0);
  var totBen=totCA-totCogs;
  var totNet3=totBen-totCA*0.03;
  var totNet15=totBen-totCA*0.15;
  var h='<div style="display:flex;gap:8px;margin-bottom:14px"><button class="btn-sm" onclick="copyComptable()"><i class="ti ti-copy"></i> Copier pour comptable</button><button class="btn-sm" onclick="exportCSV()"><i class="ti ti-download"></i> CSV</button></div>';
  h+='<div style="font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Pour moi</div>';
  h+='<div style="background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);padding:14px;margin-bottom:16px"><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">';
  h+='<div style="background:var(--bg2);border-radius:var(--r);padding:10px"><div style="font-size:11px;color:var(--text2);margin-bottom:3px;font-weight:600">Chiffre d\'affaires</div><div style="font-size:18px;font-weight:700">'+fu(totCA)+'</div></div>';
  h+='<div style="background:var(--rbg);border-radius:var(--r);padding:10px"><div style="font-size:11px;color:var(--rtxt);margin-bottom:3px;font-weight:600">Total achats</div><div style="font-size:18px;font-weight:700;color:var(--rtxt)">'+fu(totCogs)+'</div></div>';
  h+='<div style="background:var(--gbg);border-radius:var(--r);padding:10px"><div style="font-size:11px;color:var(--gtxt);margin-bottom:3px;font-weight:600">Benefice brut</div><div style="font-size:18px;font-weight:700;color:var(--gtxt)">'+fu(totBen)+'</div></div>';
  h+='<div style="background:var(--bbg);border-radius:var(--r);padding:10px"><div style="font-size:11px;color:var(--btxt);margin-bottom:3px;font-weight:600">Provision 3%</div><div style="font-size:18px;font-weight:700;color:var(--btxt)">'+fu(totNet3)+'</div></div>';
  h+='<div style="background:var(--abg);border-radius:var(--r);padding:10px;grid-column:span 2"><div style="font-size:11px;color:var(--atxt);margin-bottom:3px;font-weight:600">Provision 15%</div><div style="font-size:18px;font-weight:700;color:var(--atxt)">'+fu(totNet15)+'</div></div>';
  h+='</div></div>';
  h+='<div style="font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Pour mon comptable</div>';
  h+='<div style="background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);padding:14px;margin-bottom:16px"><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">';
  h+='<div style="background:var(--bg2);border-radius:var(--r);padding:10px"><div style="font-size:11px;color:var(--text2);margin-bottom:3px;font-weight:600">Chiffre d\'affaires</div><div style="font-size:18px;font-weight:700">'+fu(totCA)+'</div></div>';
  h+='<div style="background:var(--rbg);border-radius:var(--r);padding:10px"><div style="font-size:11px;color:var(--rtxt);margin-bottom:3px;font-weight:600">Total achats</div><div style="font-size:18px;font-weight:700;color:var(--rtxt)">'+fu(totCogs)+'</div></div>';
  h+='<div style="background:var(--gbg);border-radius:var(--r);padding:10px;grid-column:span 2"><div style="font-size:11px;color:var(--gtxt);margin-bottom:3px;font-weight:600">Benefice brut</div><div style="font-size:22px;font-weight:700;color:var(--gtxt)">'+fu(totBen)+'</div></div>';
  h+='</div>';
  if (act.length>0){
    h+='<div style="font-size:11px;color:var(--text2);font-weight:600;margin-bottom:8px">Detail des ventes ('+act.length+')</div><div style="max-height:200px;overflow-y:auto">';
    act.forEach(function(v){h+='<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px"><span style="color:var(--text2)">'+v.d+' '+v.h+' — '+v.who+'</span><span style="font-weight:700">'+fu(v.tot)+'</span></div>';});
    h+='</div>';
  }
  h+='</div>';
  return h;
}

function rSet(){
  return '<div class="form-section"><h3>Exchange rate</h3><label>1 USD = ? TZS</label><input type="number" value="'+S.taux+'" oninput="S.taux=parseInt(this.value)||S.taux;saveSettings()" style="margin-bottom:10px"><div style="font-size:13px;color:var(--text2);margin-top:4px">Current: 1 USD = '+S.taux+' TZS</div></div>'+
  '<div class="form-section"><h3>Staff name</h3><input type="text" value="'+S.sn+'" oninput="S.sn=this.value" style="margin-bottom:10px"><button class="btn btn-dark" onclick="saveSettings();alert(\'Saved!\');render()">Save</button></div>'+
  '<div style="background:var(--bbg);border-radius:var(--rl);padding:14px;margin-bottom:14px"><div style="font-size:13px;color:var(--btxt);font-weight:600">✅ Synchronisation en temps reel active</div><div style="font-size:12px;color:var(--btxt);margin-top:4px">hronisees avec Supabase</div></div>';
}

// START
initDB();
</script>
